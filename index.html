<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAZapp</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" id="manifest">

<meta name="theme-color" content="#2563eb">

<style>

/* GLOBAL */

body{
font-family:Arial,Helvetica,sans-serif;
transition:.3s;
}

.dark{
background:#0f172a;
color:white;
}

.dark .card{
background:#020617;
}

/* SPLASH */

#splash{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:3rem;
font-weight:900;
letter-spacing:2px;
animation:fadeout 2.5s forwards 1.8s;
}

#splash span{
color:#22d3ee;
}

@keyframes fadeout{
to{opacity:0;visibility:hidden;}
}

/* STORIES */

.story{
max-width:420px;
margin:auto;
}

.story img,
.story video{
width:100%;
border-radius:12px;
}

/* LOGO */

.logo{
width:28px;
height:28px;
margin-right:8px;
}

/* CARD */

.card{
background:white;
border-radius:12px;
padding:12px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

</style>
</head>

<body id="body" class="bg-gray-100 min-h-screen flex flex-col">

<!-- SPLASH -->

<div id="splash">
VAZ<span>app</span>
</div>

<!-- HEADER -->

<header class="bg-blue-600 text-white p-3 flex justify-between items-center">

<h1 class="font-bold text-xl">VAZapp</h1>

<div class="space-x-2">

<button onclick="showChat()" class="bg-blue-500 px-3 py-1 rounded">
Chat
</button>

<button onclick="showStories()" class="bg-blue-500 px-3 py-1 rounded">
Stories
</button>

<button onclick="showProfile()" class="bg-blue-500 px-3 py-1 rounded">
Profile
</button>

<button onclick="toggleDark()" class="bg-gray-800 px-3 py-1 rounded">
🌙
</button>

</div>

</header>

<!-- MAIN -->

<main class="flex-1 p-4 flex justify-center">

<!-- CHAT -->

<div id="chatPage" class="card w-full max-w-xl flex flex-col">

<div class="flex items-center mb-2">

<img id="chatAvatar"
class="w-8 h-8 rounded-full mr-2"
src="https://via.placeholder.com/40">

<b id="chatName">Guest</b>

</div>

<div id="chat"
class="flex-1 border rounded p-2 mb-2 overflow-y-auto">
</div>

<div class="flex gap-2">

<input id="userInput"
class="flex-1 border rounded p-2"
placeholder="Type here...">

<button onclick="sendMessage()"
class="bg-blue-600 text-white px-4 rounded">
Send
</button>

</div>

</div>

<!-- STORIES -->

<div id="storiesPage"
class="hidden w-full max-w-2xl">

<div class="card mb-3">

<input type="file"
accept="image/*,video/*"
onchange="uploadStory(event)">

</div>

<div id="storiesFeed"></div>

</div>

<!-- PROFILE -->

<div id="profilePage"
class="hidden card w-full max-w-md">

<h2 class="text-xl font-bold mb-3">
Profile
</h2>

<img id="profilePic"
class="w-24 h-24 rounded-full mx-auto mb-3"
src="https://via.placeholder.com/120">

<input type="file"
accept="image/*"
onchange="loadPic(event)"
class="mb-3">

<input id="usernameInput"
class="border w-full p-2 mb-3"
placeholder="Username">

<button onclick="saveProfile()"
class="bg-blue-600 text-white w-full p-2 rounded">

Save

</button>

</div>

</main>

<footer class="bg-gray-200 text-center p-2 text-sm">
© 2026 VAZapp
</footer>

<!-- SCRIPT -->

<script>

/* NAV */

const chatPage = document.getElementById("chatPage");
const storiesPage = document.getElementById("storiesPage");
const profilePage = document.getElementById("profilePage");

function showChat(){
chatPage.classList.remove("hidden");
storiesPage.classList.add("hidden");
profilePage.classList.add("hidden");
}

function showStories(){
storiesPage.classList.remove("hidden");
chatPage.classList.add("hidden");
profilePage.classList.add("hidden");
renderStories();
}

function showProfile(){
profilePage.classList.remove("hidden");
chatPage.classList.add("hidden");
storiesPage.classList.add("hidden");
}

/* DARK MODE */

function toggleDark(){

body.classList.toggle("dark");

localStorage.dark =
body.classList.contains("dark");

}

/* PROFILE */

function loadPic(e){

const r = new FileReader();

r.onload = ()=>{
profilePic.src = r.result;
};

r.readAsDataURL(e.target.files[0]);

}

function saveProfile(){

localStorage.user =
usernameInput.value || "Guest";

localStorage.pic =
profilePic.src;

loadProfile();
showChat();

}

function loadProfile(){

chatName.textContent =
localStorage.user || "Guest";

usernameInput.value =
localStorage.user || "";

if(localStorage.pic){

profilePic.src = localStorage.pic;
chatAvatar.src = localStorage.pic;

}

}

/* CHAT */

function addMsg(t,s){

const d = document.createElement("div");

d.className =
s==="u" ?
"text-right text-blue-600" :
"text-left text-green-600";

d.textContent =
(s==="u"?"You: ":"vazAI: ")+t;

chat.appendChild(d);

chat.scrollTop = chat.scrollHeight;

}

function sendMessage(){

const t = userInput.value.trim();

if(!t) return;

addMsg(t,"u");

userInput.value="";

setTimeout(()=>{
addMsg(ai(t),"a");
},500);

}

userInput.onkeydown = e=>{
if(e.key==="Enter") sendMessage();
};

function ai(m){

m=m.toLowerCase();

if(m.includes("hello")) return "Hey 👋";

if(m.includes("help")) return "What do you need?";

if(m.includes("code")) return "Tell me your project.";

if(m.includes("sad")) return "I got you 💙";

if(/\d+[+\-*\/]\d+/.test(m))
return "Answer: "+eval(m);

return "Tell me more 🙂";

}

/* STORIES */

let stories = [];

const fakeStories = [

{
user:"NHL",
logo:"https://upload.wikimedia.org/wikipedia/en/3/3a/NHL_Logo.svg",
type:"gif",
src:"https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
text:"Connor McDavid scores twice vs Flames"
},

{
user:"NHL",
logo:"https://upload.wikimedia.org/wikipedia/en/3/3a/NHL_Logo.svg",
type:"gif",
src:"https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif",
text:"Maple Leafs OT winner vs Bruins"
},

{
user:"NBC News",
logo:"https://upload.wikimedia.org/wikipedia/commons/7/79/NBC_News_2013.svg",
type:"image",
src:"https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3",
text:"Stocks rally after Fed announcement"
},

{
user:"NFL",
logo:"https://upload.wikimedia.org/wikipedia/en/a/a2/National_Football_League_logo.svg",
type:"image",
src:"https://images.unsplash.com/photo-1508098682722-e99c43a406b2",
text:"Chiefs dominate AFC Championship"
}

];

function loadStories(){

const saved =
localStorage.getItem("vaz_stories");

if(saved){

stories = JSON.parse(saved);

}
else{

stories = [...fakeStories];

saveStories();

}

}

function saveStories(){

localStorage.setItem(
"vaz_stories",
JSON.stringify(stories)
);

}

function uploadStory(e){

const f = e.target.files[0];

if(!f) return;

const cap =
prompt("Caption?") || "My story";

const type =
f.type.startsWith("image") ?
"image":"video";

const r = new FileReader();

r.onload = ()=>{

stories.unshift({

user: localStorage.user || "Guest",
logo:"",
type:type,
src:r.result,
text:cap

});

saveStories();
renderStories();

};

r.readAsDataURL(f);

}

function deleteStory(i){

if(!confirm("Delete?")) return;

stories.splice(i,1);

saveStories();
renderStories();

}

function renderStories(){

storiesFeed.innerHTML="";

stories.forEach((s,i)=>{

if(!s.src) return;

const box =
document.createElement("div");

box.className="story card mb-4";

let media="";

if(s.type==="image"||s.type==="gif"){

media =
`<img src="${s.src}">`;

}
else{

media =
`<video src="${s.src}" controls></video>`;

}

const del =
s.user ===
(localStorage.user||"Guest")
? `<button onclick="deleteStory(${i})"
class="text-red-500">🗑️</button>`
:"";

box.innerHTML = `

<div class="flex justify-between items-center mb-2">

<div class="flex items-center">

${s.logo?
`<img src="${s.logo}" class="logo">`
:""}

<b>${s.user}</b>

</div>

${del}

</div>

${media}

<p class="mt-2 text-sm">
${s.text}
</p>

`;

storiesFeed.appendChild(box);

});

}

/* INIT */

function init(){

if(localStorage.dark==="true")
body.classList.add("dark");

loadProfile();
loadStories();

addMsg("Hi! I'm vazAI 🤖","a");

}

init();

/* PWA */

const manifest = {
name:"VAZapp",
short_name:"VAZapp",
start_url:".",
display:"standalone",
background_color:"#000",
theme_color:"#2563eb"
};

const blob =
new Blob([JSON.stringify(manifest)],
{type:"application/json"});

document.getElementById("manifest").href =
URL.createObjectURL(blob);

if("serviceWorker" in navigator){

const sw = `
self.addEventListener("install",e=>{
caches.open("vaz")
.then(c=>c.addAll(["./"]));
});
self.addEventListener("fetch",e=>{
e.respondWith(
caches.match(e.request)
.then(r=>r||fetch(e.request))
);
});
`;

const b =
new Blob([sw],{type:"text/javascript"});

navigator.serviceWorker
.register(URL.createObjectURL(b));

}

</script>

</body>
</html>
