<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VAZapp</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:Arial;
transition:.3s;
overflow:hidden;
}

.dark{
background:#111827;
color:white;
}

/* Splash */

#splash{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:3rem;
font-weight:bold;
animation:fadeOut 2s forwards 1.5s;
}

@keyframes glow{
0%,100%{text-shadow:0 0 10px cyan}
50%{text-shadow:0 0 30px cyan}
}

#splash span{
animation:glow 1.5s infinite;
color:cyan;
}

@keyframes fadeOut{
to{opacity:0;pointer-events:none}
}

/* Layout */

#app{
display:flex;
height:100vh;
}

/* Sidebar */

#sidebar{
width:80px;
background:#2563eb;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:10px 0;
gap:20px;
}

#sidebar button{
width:50px;
height:50px;
border-radius:50%;
background:#1d4ed8;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

#sidebar button:hover{
background:#3b82f6;
}

/* Main */

#main{
flex:1;
padding:15px;
overflow:hidden;
}

/* Pages */

.page{
height:100%;
display:none;
}

.page.active{
display:flex;
flex-direction:column;
}

/* Chat */

#chatBox{
flex:1;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

/* Stories */

.story{
border:1px solid #ddd;
padding:10px;
border-radius:12px;
margin-bottom:15px;
}

.story img,
.story video{
width:100%;
max-height:400px;
object-fit:cover;
border-radius:10px;
}

/* Profile */

#profile img{
width:100px;
height:100px;
border-radius:50%;
margin:auto;
}

.userRow{
display:flex;
align-items:center;
gap:8px;
margin-bottom:4px;
}

.userRow img{
width:22px;
height:22px;
}

</style>
</head>

<body id="body" class="bg-gray-100">

<!-- Splash -->
<div id="splash">
<span>VAZapp</span>
</div>

<div id="app">

<!-- Sidebar -->
<div id="sidebar">

<button onclick="showPage('chat')">💬</button>
<button onclick="showPage('stories')">📸</button>
<button onclick="showPage('profile')">👤</button>
<button onclick="toggleDark()">🌙</button>

</div>

<!-- Main -->
<div id="main">

<!-- Chat -->
<div id="chat" class="page active">

<div id="chatBox"></div>

<div class="flex gap-2">

<input id="msg"
class="flex-1 border p-2 rounded"
placeholder="Type message...">

<button onclick="send()"
class="bg-blue-600 text-white px-4 rounded">
Send
</button>

</div>

</div>

<!-- Stories -->
<div id="stories" class="page">

<!-- Upload -->
<div class="mb-3 flex gap-2">
<input type="file" id="storyFile" accept="image/*,video/*">
<button onclick="postStory()" class="bg-blue-600 text-white px-3 rounded">
Post
</button>
</div>

<div id="storyFeed" class="overflow-y-auto"></div>

</div>

<!-- Profile -->
<div id="profile" class="page">

<img id="avatar" src="https://via.placeholder.com/100">

<input type="file" onchange="loadPic(event)" class="my-3">

<input id="name"
class="border p-2 w-full mb-2"
placeholder="Username">

<button onclick="saveProfile()"
class="bg-blue-600 text-white p-2 rounded w-full">
Save
</button>

</div>

</div>
</div>

<script>

/* Base path */

const BASE="https://svazny79.github.io/VAZapp/";

/* Pages */

const pages=document.querySelectorAll(".page");

function showPage(id){

pages.forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

if(id==="stories")renderStories();

}

/* Dark */

function toggleDark(){

body.classList.toggle("dark");
localStorage.dark=body.classList.contains("dark");

}

/* Profile */

function loadPic(e){

const r=new FileReader();
r.onload=()=>avatar.src=r.result;
r.readAsDataURL(e.target.files[0]);

}

function saveProfile(){

localStorage.name=name.value||"Guest";
localStorage.avatar=avatar.src;

alert("Saved!");

}

function loadProfile(){

name.value=localStorage.name||"";

if(localStorage.avatar)
avatar.src=localStorage.avatar;

}

/* Chat */

const box=document.getElementById("chatBox");

function add(t,u){

const d=document.createElement("div");

d.className=u?"text-right text-blue-600":"text-green-600";

d.textContent=(u?"You: ":"vazAI: ")+t;

box.appendChild(d);
box.scrollTop=999999;

}

function send(){

const t=msg.value.trim();

if(!t)return;

add(t,1);

msg.value="";

setTimeout(()=>add(ai(t),0),500);

}

msg.onkeydown=e=>{
if(e.key==="Enter")send();
};

/* AI */

function ai(m){

m=m.toLowerCase();

if(m.includes("hi"))return"Hey 👋";

if(m.includes("who are you"))
return"I'm vazAI inside VAZapp 😎";

if(m.includes("stock"))
return"Markets are volatile today 📈📉";

if(m.includes("football"))
return"Big matchup this weekend 🏈";

if(/\d+[\+\-\*\/]\d+/.test(m))
return"Answer: "+eval(m);

return"Tell me more 👀";

}

/* Stories */

let stories=JSON.parse(localStorage.stories||"[]");

/* Logos */

const logos={
"NHL":BASE+"nhl.png",
"NBC-News":BASE+"nbc.png"
};

/* Fixed Fake Stories */

const fixed=[

{
u:"NHL",
t:"Connor McDavid scores 2 vs Flames",
src:BASE+"mcdavid.png",
type:"img"
},

{
u:"NHL",
t:"Leafs win OT vs Bruins",
src:BASE+"leafs.gif",
type:"img"
},

{
u:"NHL",
t:"Rangers clinch playoff at MSG",
src:BASE+"rangers.gif",
type:"img"
},

{
u:"NBC-News",
t:"Miami flooded after storm",
src:BASE+"news.gif",
type:"img"
},

{
u:"MarketWatch",
t:"Dow jumps 400 points after Fed news",
src:BASE+"stocks.jpg",
type:"img"
},

{
u:"ESPN",
t:"Chiefs win thriller in final seconds",
src:BASE+"football.jpg",
type:"img"
},

{
u:"TechDaily",
t:"Apple unveils new AI chip",
src:BASE+"tech.jpg",
type:"img"
}

];

/* Load once */

if(!localStorage.fakeLoaded){

stories=[...fixed,...stories];
localStorage.fakeLoaded=1;
saveStories();

}

/* User Post */

function postStory(){

const file=storyFile.files[0];

if(!file)return alert("Select a file");

const r=new FileReader();

r.onload=()=>{

stories.unshift({

u:localStorage.name||"Guest",
t:"My Story",
src:r.result,
type:file.type.startsWith("video")?"vid":"img"

});

saveStories();
renderStories();

storyFile.value="";

};

r.readAsDataURL(file);

}

/* Render */

function renderStories(){

storyFeed.innerHTML="";

stories.forEach(s=>{

if(!s.src)return;

const d=document.createElement("div");
d.className="story";

let media="";

if(s.type==="img"){
media=`<img src="${s.src}">`;
}

if(s.type==="vid"){
media=`<video src="${s.src}" controls></video>`;
}

/* Logo */

let logo="";

if(logos[s.u]){
logo=`<img src="${logos[s.u]}">`;
}

d.innerHTML=`

<div class="userRow">
${logo}
<b>${s.u}</b>
</div>

<p class="text-sm mb-1">${s.t}</p>

${media}

`;

storyFeed.appendChild(d);

});

}

/* Save */

function saveStories(){

localStorage.stories=JSON.stringify(stories);

}

/* Init */

function init(){

if(localStorage.dark==="true")
body.classList.add("dark");

loadProfile();

add("Welcome to VAZapp 🤖",0);

renderStories();

}

init();

</script>

</body>
</html>
