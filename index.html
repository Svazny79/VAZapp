<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VAZapp</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;margin:0}

/* Splash */
#splash{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:black;z-index:9999;
font-size:3rem;font-weight:bold;
transition:all 1.2s ease;
}
#splash.hide{opacity:0;transform:scale(1.2)}
#splash span:first-child{color:#0ff;text-shadow:0 0 20px #0ff}

/* Nav */
nav{background:#2563eb;padding:10px;display:flex;justify-content:space-between}
nav button{background:#1e40af;padding:6px 12px;border-radius:6px}

/* Pages */
.page{display:none;height:100vh}
.page.active{display:block}

/* Stories */
#storiesFeed{
height:90vh;
overflow-y:auto;
scroll-snap-type:y mandatory;
}

.story{
height:90vh;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
position:relative;
flex-direction:column;
}

.story img,.story video{
max-height:70vh;
max-width:95%;
border-radius:12px;
object-fit:contain;
}

.overlay{
position:absolute;
bottom:0;left:0;right:0;
padding:15px;
background:linear-gradient(transparent,rgba(0,0,0,.8));
}

.user{
position:absolute;
top:10px;left:10px;
background:rgba(0,0,0,.6);
padding:4px 8px;
border-radius:8px;
font-weight:bold;
}
</style>
</head>

<body>

<!-- Splash -->
<div id="splash">
<span>VAZ</span><span>app</span>
</div>

<!-- Nav -->
<nav>
<b>VAZapp</b>
<div>
<button onclick="show('chat')">Chat</button>
<button onclick="show('stories')">Stories</button>
<button onclick="show('profile')">Profile</button>
</div>
</nav>

<!-- Chat -->
<div id="chat" class="page active p-4">

<div id="chatBox" class="h-[75vh] overflow-y-auto border p-2 mb-2"></div>

<div class="flex gap-2">
<input id="msg" class="flex-1 p-2 text-black"/>
<button onclick="send()">Send</button>
</div>

</div>

<!-- Stories -->
<div id="stories" class="page">

<input type="file" accept="image/*,video/*"
class="m-2"
onchange="upload(event)">

<div id="storiesFeed"></div>

</div>

<!-- Profile -->
<div id="profile" class="page p-4">

<img id="avatar" class="w-24 h-24 rounded-full mb-2"
src="https://via.placeholder.com/120">

<input type="file" accept="image/*"
onchange="loadImg(event)"><br><br>

<input id="name" class="p-2 text-black w-full mb-2"
placeholder="Username">

<button onclick="save()">Save</button>

</div>

<script>

/* Splash */
setTimeout(()=>{
splash.classList.add("hide");
setTimeout(()=>splash.remove(),1200);
},1500);

/* Nav */
function show(id){
document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

if(id==="stories") render();
}

/* Profile */
function loadImg(e){
const r=new FileReader();
r.onload=()=>avatar.src=r.result;
r.readAsDataURL(e.target.files[0]);
}

function save(){
localStorage.user=name.value||"Guest";
localStorage.avatar=avatar.src;
alert("Saved!");
}

if(localStorage.avatar) avatar.src=localStorage.avatar;
if(localStorage.user) name.value=localStorage.user;

/* Chat */
function add(t,u){
const d=document.createElement("div");
d.textContent=(u?"You: ":"vazAI: ")+t;
d.className=u?"text-blue-400":"text-green-400";
chatBox.appendChild(d);
chatBox.scrollTop=999999;
}

function send(){
if(!msg.value)return;
add(msg.value,1);
setTimeout(()=>add(ai(msg.value),0),500);
msg.value="";
}

function ai(m){
m=m.toLowerCase();
if(m.includes("hi"))return"Hey 👋";
if(m.includes("help"))return"What do you need?";
if(/\d+[\+\-\*\/]\d+/.test(m))return"="+eval(m);
return"Tell me more 🙂";
}

/* Stories */

let stories=JSON.parse(localStorage.stories||"[]");

/* Fixed NHL + News */
const fixed=[
{u:"NHL",t:"Connor McDavid scores 2 vs Flames",s:"mcdavid.png",m:"img"},
{u:"NHL",t:"Leafs win OT vs Bruins",s:"leafs.gif",m:"img"},
{u:"NHL",t:"Rangers clinch playoff at MSG",s:"rangers.gif",m:"img"},
{u:"NBC-News",t:"Miami flooded after storm",s:"news.gif",m:"img"}
];

function loadFixed(){

if(!localStorage.fixedLoaded){

fixed.forEach(f=>{
stories.push({
id:Date.now()+Math.random(),
user:f.u,
text:f.t,
src:f.s,
type:f.m,
fake:1
});
});

localStorage.fixedLoaded=1;
saveStories();
}
}

loadFixed();

function upload(e){

const f=e.target.files[0];
if(!f)return;

const cap=prompt("Caption")||"My story";
const r=new FileReader();

r.onload=()=>{

stories.unshift({
id:Date.now(),
user:localStorage.user||"Guest",
text:cap,
src:r.result,
type:f.type.startsWith("image")?"img":"vid"
});

saveStories();
render();
};

r.readAsDataURL(f);
}

function saveStories(){
localStorage.stories=JSON.stringify(stories);
}

function render(){

storiesFeed.innerHTML="";

stories.forEach((s,i)=>{

const d=document.createElement("div");
d.className="story";

let media=
s.type==="img"
?`<img src="${s.src}">`
:`<video src="${s.src}" autoplay loop muted></video>`;

d.innerHTML=`
<div class="user">${s.user}</div>
${media}
<div class="overlay">
<p>${s.text}</p>
</div>
`;

storiesFeed.appendChild(d);

});
}

/* Swipe */

let y=0;

storiesFeed.addEventListener("touchstart",
e=>y=e.touches[0].clientY);

storiesFeed.addEventListener("touchend",
e=>{
let d=y-e.changedTouches[0].clientY;

if(Math.abs(d)>60){
storiesFeed.scrollBy({
top:d>0?window.innerHeight:-window.innerHeight,
behavior:"smooth"
});
}
});

</script>
</body>
</html>
