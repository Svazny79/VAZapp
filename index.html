<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>VAZapp</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" id="manifest">
<meta name="theme-color" content="#2563eb">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:white;
overflow:hidden;
}

/* SPLASH */

#splash{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:3rem;
font-weight:900;
z-index:9999;
animation:fadeout 2.5s forwards 1.5s;
}

#splash span{color:#22d3ee}

@keyframes fadeout{
to{opacity:0;visibility:hidden}
}

/* HEADER */

header{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* NAV */

.navbtn{
background:#2563eb;
padding:6px 12px;
border-radius:6px;
font-size:14px;
}

/* PAGES */

.page{
display:none;
height:calc(100vh - 60px);
overflow:hidden;
}

.active{
display:block;
}

/* STORIES */

#storiesFeed{
height:100%;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.story{
height:100%;
scroll-snap-align:start;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.story img,
.story video{
max-height:100%;
max-width:100%;
object-fit:contain;
}

/* SIDE BAR */

.sideBar{
position:absolute;
right:12px;
bottom:120px;
display:flex;
flex-direction:column;
gap:18px;
font-size:22px;
}

.sideBar button{
background:rgba(0,0,0,.5);
padding:10px;
border-radius:50%;
}

/* PROFILE */

.card{
background:#111;
padding:15px;
border-radius:10px;
}

input{
color:black;
}

/* CHAT */

#chat{
height:80%;
overflow-y:auto;
border:1px solid #333;
padding:6px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
VAZ<span>app</span>
</div>

<!-- HEADER -->
<header>

<b>VAZapp</b>

<div class="space-x-2">

<button onclick="show('chat')" class="navbtn">Chat</button>
<button onclick="show('stories')" class="navbtn">Stories</button>
<button onclick="show('profile')" class="navbtn">Profile</button>

</div>

</header>

<!-- CHAT -->
<div id="chatPage" class="page active p-3">

<div id="chat"></div>

<div class="flex gap-2 mt-2">

<input id="msg" class="flex-1 p-2 rounded">

<button onclick="send()" class="navbtn">
Send
</button>

</div>

</div>

<!-- STORIES -->
<div id="storiesPage" class="page">

<div id="storiesFeed"></div>

</div>

<!-- PROFILE -->
<div id="profilePage" class="page p-4">

<div class="card">

<h2 class="text-xl mb-2">Profile</h2>

<img id="pic" class="w-24 h-24 rounded-full mb-3"
src="https://via.placeholder.com/100">

<input type="file" onchange="loadPic(event)">

<input id="name"
class="w-full p-2 my-2"
placeholder="Username">

<button onclick="saveProfile()"
class="navbtn w-full">
Save
</button>

</div>

<hr class="my-4">

<div class="card">

<h3>Upload Story</h3>

<input type="file"
accept="image/*,video/*"
onchange="upload(event)">

</div>

</div>

<!-- SCRIPT -->
<script>

/* NAV */

const pages={
chat:chatPage,
stories:storiesPage,
profile:profilePage
};

function show(p){

Object.values(pages)
.forEach(x=>x.classList.remove("active"));

pages[p].classList.add("active");

if(p==="stories") render();

}

/* PROFILE */

function saveProfile(){

localStorage.user=name.value||"Guest";
localStorage.pic=pic.src;

}

function loadPic(e){

const r=new FileReader();

r.onload=()=>pic.src=r.result;

r.readAsDataURL(e.target.files[0]);

}

/* CHAT */

function add(t,s){

const d=document.createElement("div");

d.textContent=(s?"You: ":"vazAI: ")+t;

chat.appendChild(d);

chat.scrollTop=chat.scrollHeight;

}

function send(){

const t=msg.value.trim();

if(!t) return;

add(t,1);

msg.value="";

setTimeout(()=>{
add(ai(t),0);
},600);

}

function ai(m){

m=m.toLowerCase();

if(m.includes("hi")) return "Hey 👋";
if(m.includes("help")) return "How can I help?";
if(m.includes("code")) return "Tell me about it.";
if(m.includes("sad")) return "I'm here 💙";

return "Interesting. Tell me more.";

}

/* STORIES DATA */

let stories=[];

const fake=[

{
user:"NHL",
src:"https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
type:"gif",
text:"McDavid scores twice vs Flames"
},

{
user:"NHL",
src:"https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif",
type:"gif",
text:"Leafs win in overtime"
},

{
user:"NBC News",
src:"https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3",
type:"img",
text:"Stock market surges"
},

{
user:"NFL",
src:"https://images.unsplash.com/photo-1508098682722-e99c43a406b2",
type:"img",
text:"Chiefs dominate playoffs"
}

];

/* LOAD */

function load(){

const s=localStorage.stories;

if(s) stories=JSON.parse(s);
else{
stories=[...fake];
save();
}

}

function save(){
localStorage.stories=JSON.stringify(stories);
}

/* UPLOAD */

function upload(e){

const f=e.target.files[0];

if(!f) return;

const cap=prompt("Caption?")||"My story";

const r=new FileReader();

r.onload=()=>{

stories.unshift({

user:localStorage.user||"Guest",
src:r.result,
type:f.type.startsWith("video")?"vid":"img",
text:cap

});

save();
render();

};

r.readAsDataURL(f);

}

/* DELETE */

function del(i){

if(!confirm("Delete?")) return;

stories.splice(i,1);

save();
render();

}

/* RENDER */

function render(){

storiesFeed.innerHTML="";

stories.forEach((s,i)=>{

const d=document.createElement("div");

d.className="story";

let media="";

if(s.type==="vid"){

media=`<video src="${s.src}" autoplay loop muted></video>`;

}
else{

media=`<img src="${s.src}">`;

}

const delBtn=
s.user===(localStorage.user||"Guest")
?`<button onclick="del(${i})">🗑️</button>`
:"";

d.innerHTML=`

${media}

<div class="absolute bottom-10 left-4">

<b>${s.user}</b>

<p>${s.text}</p>

</div>

<div class="sideBar">

<button>❤️</button>
<button>💬</button>
<button>↗️</button>

${delBtn}

</div>

`;

storiesFeed.appendChild(d);

});

}

/* INIT */

function init(){

load();

add("Hi! I'm vazAI 🤖",0);

}

init();

/* PWA */

const manifest={
name:"VAZapp",
short_name:"VAZapp",
start_url:".",
display:"standalone",
background_color:"#000",
theme_color:"#2563eb"
};

const blob=new Blob(
[JSON.stringify(manifest)],
{type:"application/json"}
);

manifest.href=
URL.createObjectURL(blob);

if("serviceWorker" in navigator){

const sw=`

self.addEventListener("install",e=>{
caches.open("vaz").then(c=>c.addAll(["./"]));
});

self.addEventListener("fetch",e=>{
e.respondWith(
caches.match(e.request)
.then(r=>r||fetch(e.request))
);
});

`;

navigator.serviceWorker.register(
URL.createObjectURL(
new Blob([sw],{type:"text/javascript"})
)
);

}

</script>

</body>
</html>
