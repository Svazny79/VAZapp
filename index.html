<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAZapp</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" id="manifest">

<meta name="theme-color" content="#2563eb">

<style>

/* ===== GLOBAL ===== */

body{
font-family:Arial,sans-serif;
transition:0.3s;
}

.dark{
background:#111827;
color:white;
}

.dark .bg-white{
background:#1f2933!important;
color:white;
}

/* ===== SPLASH ===== */

@keyframes glow{
0%,100%{text-shadow:0 0 5px #0ff,0 0 15px #0ff}
50%{text-shadow:0 0 30px #0ff}
}

#splash{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:3rem;
font-weight:bold;
z-index:9999;
transition:opacity 1.5s;
}

#splash span:first-child{
color:#0ff;
animation:glow 1.5s infinite;
}

#splash span:last-child{
color:white;
}

/* ===== STORIES ===== */

.story{
background:white;
}

.dark .story{
background:#1f2933;
}

.logo{
width:22px;
height:22px;
margin-right:6px;
}

</style>
</head>

<body id="body" class="bg-gray-100 min-h-screen flex flex-col">

<!-- SPLASH -->
<div id="splash">
<span>VAZ</span><span>app</span>
</div>

<!-- HEADER -->
<header class="bg-blue-600 text-white p-4 flex justify-between">

<h1 class="font-bold text-xl">VAZapp</h1>

<div class="space-x-2">

<button onclick="showChat()" class="bg-blue-500 px-3 py-1 rounded">Chat</button>

<button onclick="showStories()" class="bg-blue-500 px-3 py-1 rounded">Stories</button>

<button onclick="showProfile()" class="bg-blue-500 px-3 py-1 rounded">Profile</button>

<button onclick="toggleDark()" class="bg-gray-800 px-3 py-1 rounded">🌙</button>

</div>

</header>


<main class="flex-1 p-4 flex justify-center">

<!-- CHAT -->

<div id="chatPage" class="bg-white w-full max-w-xl p-4 rounded shadow flex flex-col">

<div class="flex items-center gap-2 mb-2">

<img id="chatAvatar" class="w-8 h-8 rounded-full" src="https://via.placeholder.com/40">

<b id="chatName">Guest</b>

</div>

<div id="chat" class="flex-1 border p-2 rounded mb-2 overflow-y-auto"></div>

<div class="flex gap-2">

<input id="userInput"
class="flex-1 border p-2 rounded bg-white dark:bg-gray-700"
placeholder="Type...">

<button onclick="sendMessage()" class="bg-blue-600 text-white px-3 rounded">
Send
</button>

</div>

</div>


<!-- STORIES -->

<div id="storiesPage" class="hidden bg-white w-full max-w-2xl p-4 rounded shadow">

<h2 class="text-xl font-bold mb-3">📸 Stories</h2>

<input type="file" accept="image/*,video/*" onchange="uploadStory(event)" class="mb-3">

<div id="storiesFeed" class="space-y-4"></div>

</div>


<!-- PROFILE -->

<div id="profilePage" class="hidden bg-white w-full max-w-md p-4 rounded shadow">

<h2 class="text-xl font-bold mb-3">Profile</h2>

<img id="profilePreview"
class="w-24 h-24 rounded-full mx-auto mb-2"
src="https://via.placeholder.com/120">

<input type="file" accept="image/*" onchange="loadAvatar(event)">

<br><br>

<input id="usernameInput"
class="border p-2 w-full mb-2"
placeholder="Username">

<button onclick="saveProfile()"
class="bg-blue-600 text-white w-full p-2 rounded">
Save
</button>

</div>

</main>


<footer class="bg-gray-200 p-2 text-center text-sm">

©2026 VAZapp

</footer>



<script>

/* ===== SPLASH ===== */

window.onload=()=>{

setTimeout(()=>{

splash.style.opacity="0";

setTimeout(()=>{

splash.remove();

},1500);

},1200);

};


/* ===== NAV ===== */

const chatPage = chatPage = document.getElementById("chatPage");
const storiesPage = document.getElementById("storiesPage");
const profilePage = document.getElementById("profilePage");

function showChat(){
chatPage.classList.remove("hidden");
storiesPage.classList.add("hidden");
profilePage.classList.add("hidden");
}

function showStories(){
storiesPage.classList.remove("hidden");
chatPage.classList.add("hidden");
profilePage.classList.add("hidden");
renderStories();
}

function showProfile(){
profilePage.classList.remove("hidden");
chatPage.classList.add("hidden");
storiesPage.classList.add("hidden");
}


/* ===== DARK ===== */

function toggleDark(){

body.classList.toggle("dark");

localStorage.dark = body.classList.contains("dark");

}


/* ===== PROFILE ===== */

function loadAvatar(e){

const r=new FileReader();

r.onload=()=> profilePreview.src = r.result;

r.readAsDataURL(e.target.files[0]);

}

function saveProfile(){

localStorage.user = usernameInput.value || "Guest";
localStorage.avatar = profilePreview.src;

loadProfile();
showChat();

}

function loadProfile(){

chatName.textContent = localStorage.user || "Guest";

usernameInput.value = localStorage.user || "";

if(localStorage.avatar){

chatAvatar.src = localStorage.avatar;
profilePreview.src = localStorage.avatar;

}

}


/* ===== CHAT ===== */

function addMsg(text,side){

const d=document.createElement("div");

d.className = side==="u"
? "text-right text-blue-500"
: "text-left text-green-500";

d.textContent = (side==="u"?"You: ":"vazAI: ") + text;

chat.appendChild(d);

chat.scrollTop = chat.scrollHeight;

}

function sendMessage(){

const t=userInput.value.trim();

if(!t) return;

addMsg(t,"u");

userInput.value="";

setTimeout(()=>{

addMsg(ai(t),"a");

},600);

}

userInput.onkeydown = e=>{

if(e.key==="Enter") sendMessage();

};


function ai(m){

m=m.toLowerCase();

if(/\d+[+\-*/]\d+/.test(m)) return "Answer: "+eval(m);

if(m.includes("code")) return "Tell me what you're building.";

if(m.includes("sad")) return "I'm here for you 💙";

if(m.includes("help")) return "What do you need help with?";

return "Tell me more.";

}


/* ===== STORIES ===== */

let stories = [];


/* FAKE USERS */

const fakeStories=[

{
user:"NHL",
logo:"https://upload.wikimedia.org/wikipedia/en/3/3a/NHL_Logo.svg",
type:"gif",
src:"https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
text:"Connor McDavid scores twice vs Flames"
},

{
user:"NHL",
logo:"https://upload.wikimedia.org/wikipedia/en/3/3a/NHL_Logo.svg",
type:"gif",
src:"https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif",
text:"Maple Leafs OT winner vs Bruins"
},

{
user:"NBC News",
logo:"https://upload.wikimedia.org/wikipedia/commons/7/79/NBC_News_2013.svg",
type:"image",
src:"https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3",
text:"Stock market jumps after Fed speech"
},

{
user:"NFL",
logo:"https://upload.wikimedia.org/wikipedia/en/a/a2/National_Football_League_logo.svg",
type:"image",
src:"https://images.unsplash.com/photo-1508098682722-e99c43a406b2",
text:"Chiefs win AFC Championship"
}

];


/* LOAD */

function loadStories(){

const saved = localStorage.getItem("vaz_stories");

if(saved){

stories = JSON.parse(saved);

}else{

stories = [...fakeStories];
saveStories();

}

}


/* SAVE */

function saveStories(){

localStorage.setItem("vaz_stories",JSON.stringify(stories));

}


/* UPLOAD */

function uploadStory(e){

const file = e.target.files[0];
if(!file) return;

const caption = prompt("Caption:") || "My Story";

const type = file.type.startsWith("image") ? "image":"video";

const r=new FileReader();

r.onload=()=>{

stories.unshift({

user: localStorage.user || "Guest",
logo:"",
type:type,
src:r.result,
text:caption

});

saveStories();
renderStories();

};

r.readAsDataURL(file);

}


/* DELETE */

function deleteStory(i){

if(!confirm("Delete story?")) return;

stories.splice(i,1);

saveStories();
renderStories();

}


/* RENDER */

function renderStories(){

storiesFeed.innerHTML="";

stories.forEach((s,i)=>{

if(!s.src) return;

let media="";

if(s.type==="image" || s.type==="gif"){

media=`<img src="${s.src}" class="w-full rounded">`;

}else{

media=`<video src="${s.src}" controls class="w-full rounded"></video>`;

}

const canDelete = s.user === (localStorage.user || "Guest");

const box=document.createElement("div");

box.className="story border p-3 rounded";

box.innerHTML=`

<div class="flex justify-between items-center mb-2">

<div class="flex items-center">

${s.logo?`<img src="${s.logo}" class="logo">`:""}

<b>${s.user}</b>

</div>

${canDelete?`<button onclick="deleteStory(${i})" class="text-red-500">🗑️</button>`:""}

</div>

${media}

<p class="mt-2 text-sm">${s.text}</p>

`;

storiesFeed.appendChild(box);

});

}


/* ===== INIT ===== */

if(localStorage.dark==="true") body.classList.add("dark");

if(!localStorage.user){

setTimeout(()=>{

const u=prompt("Choose username:");

if(u){
localStorage.user=u;
loadProfile();
}

},500);

}

loadProfile();
loadStories();
addMsg("Hi! I'm vazAI 🤖","a");

</script>

</body>
</html>
