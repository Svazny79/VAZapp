<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAZapp</title>
<script src="https://cdn.tailwindcss.com"></script>

<meta name="theme-color" content="#2563eb">

<style>
body{font-family:Arial,sans-serif}
.dark{background:#111827;color:#fff}
.dark .card{background:#1f2933}

@keyframes glow{
0%,100%{text-shadow:0 0 5px #0ff}
50%{text-shadow:0 0 25px #0ff}
}

#splash{
position:fixed;inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:3rem;
font-weight:bold;
z-index:9999;
transition:opacity 1.2s ease;
}

#splash .vaz{color:#0ff;animation:glow 1.5s infinite}
#splash .app{color:white}

.storyBox{
max-width:420px;
margin:auto;
}

.storyMedia{
max-height:520px;
object-fit:contain;
margin:auto;
border-radius:12px;
}
</style>
</head>

<body id="body" class="bg-gray-100 min-h-screen flex">

<!-- Splash -->
<div id="splash">
<span><span class="vaz">VAZ</span><span class="app">app</span></span>
</div>

<!-- Sidebar -->
<div class="w-48 bg-blue-700 text-white flex flex-col p-3 gap-2">

<h2 class="font-bold text-xl mb-3">VAZapp</h2>

<button onclick="show('chat')" class="p-2 bg-blue-600 rounded">💬 Chat</button>
<button onclick="show('stories')" class="p-2 bg-blue-600 rounded">📸 Stories</button>
<button onclick="show('profile')" class="p-2 bg-blue-600 rounded">👤 Profile</button>
<button onclick="toggleDark()" class="p-2 bg-gray-800 rounded">🌙 Dark</button>

</div>

<!-- Main -->
<div class="flex-1 p-4">

<!-- CHAT -->
<div id="chat" class="card bg-white p-4 rounded shadow flex flex-col h-[90vh]">

<div class="flex gap-2 items-center mb-2">
<img id="avatar" class="w-8 h-8 rounded-full" src="https://via.placeholder.com/40">
<b id="name">Guest</b>
</div>

<div id="msgs" class="flex-1 border p-2 overflow-y-auto mb-2"></div>

<div class="flex gap-2">
<input id="input" class="flex-1 border p-2 rounded" placeholder="Type...">
<button onclick="send()" class="bg-blue-600 text-white px-3 rounded">Send</button>
</div>

</div>

<!-- STORIES -->
<div id="stories" class="hidden">

<h2 class="text-xl font-bold mb-2">Stories</h2>

<input id="file" type="file" accept="image/*,video/*" class="mb-3">

<button onclick="postStory()" class="bg-blue-600 text-white px-3 py-1 rounded mb-3">
Post
</button>

<div id="feed" class="space-y-5"></div>

</div>

<!-- PROFILE -->
<div id="profile" class="hidden card bg-white p-4 rounded shadow max-w-md">

<h2 class="text-xl font-bold mb-2">Profile</h2>

<img id="prev" class="w-24 h-24 rounded-full mb-2 mx-auto"
src="https://via.placeholder.com/120">

<input type="file" accept="image/*" onchange="loadPic(event)">

<input id="user" class="border p-2 w-full my-2" placeholder="Username">

<button onclick="save()" class="bg-blue-600 text-white w-full p-2 rounded">
Save
</button>

</div>

</div>

<script>

/* SPLASH */
window.onload=()=>{
setTimeout(()=>{
splash.style.opacity=0;
setTimeout(()=>splash.remove(),1200);
},1600);
}

/* NAV */
const pages={
chat:chat,
stories:stories,
profile:profile
};

function show(p){
Object.values(pages).forEach(x=>x.classList.add("hidden"));
pages[p].classList.remove("hidden");
render();
}

/* DARK */
function toggleDark(){
body.classList.toggle("dark");
localStorage.dark=body.classList.contains("dark");
}

/* PROFILE */
function loadPic(e){
const r=new FileReader();
r.onload=()=>prev.src=r.result;
r.readAsDataURL(e.target.files[0]);
}

function save(){
localStorage.user=user.value||"Guest";
localStorage.pic=prev.src;
load();
show("chat");
}

function load(){
name.textContent=localStorage.user||"Guest";
user.value=localStorage.user||"";
if(localStorage.pic){
avatar.src=localStorage.pic;
prev.src=localStorage.pic;
}
}

/* CHAT */
function add(t,u){
const d=document.createElement("div");
d.className=u?"text-right text-blue-600":"text-left text-green-600";
d.textContent=(u?"You: ":"vazAI: ")+t;
msgs.appendChild(d);
msgs.scrollTop=msgs.scrollHeight;
}

function send(){
const t=input.value.trim();
if(!t)return;
add(t,1);
input.value="";
setTimeout(()=>add(ai(t),0),500);
}

input.onkeydown=e=>{
if(e.key==="Enter")send();
}

function ai(m){

m=m.toLowerCase();

if(m.includes("hi")) return "Hey 👋";
if(m.includes("nhl")) return "Who’s your favorite team?";
if(m.includes("help")) return "Tell me what you need.";
if(/\d+[\+\-\/\*]\d+/.test(m)) return "="+eval(m);

return "Interesting 🤔 Tell me more.";
}

/* STORIES */

const BASE="./";

const fixed=[

/* NHL */
{u:"NHL",logo:"nhl.png",t:"McDavid scores 2 vs Flames",s:"mcdavid.png",type:"img"},
{u:"NHL",logo:"nhl.png",t:"Leafs win OT vs Bruins",s:"leafs.gif",type:"img"},
{u:"NHL",logo:"nhl.png",t:"Rangers clinch playoff spot",s:"rangers.gif",type:"img"},

/* NBC + Stocks */
{u:"NBC-News",logo:"nbc.png",t:"Major flooding in Miami",s:"news.gif",type:"img"},
{u:"NBC-News",logo:"nbc.png",t:"NASDAQ surges 2.4% after Fed update",s:"stocks.jpg",type:"img"},

/* NFL */
{u:"NFL",logo:"football.png",t:"Chiefs win last-second TD",s:"football.gif",type:"img"}

];

let storiesData=JSON.parse(localStorage.stories||"[]");

/* LOAD FAKE (NO DUPES) */
function loadFake(){

storiesData=storiesData.filter(s=>!s.fake);

fixed.forEach(f=>{

storiesData.push({
id:"f_"+f.s,
u:f.u,
logo:f.logo,
t:f.t,
src:BASE+f.s,
type:f.type,
fake:true
});

});

saveStories();
}

loadFake();

/* USER POST */
function postStory(){

const f=file.files[0];
if(!f) return alert("Choose file");

const r=new FileReader();

r.onload=()=>{

storiesData.unshift({
id:"u_"+Date.now(),
u:localStorage.user||"Guest",
logo:localStorage.pic,
t:"My Story",
src:r.result,
type:f.type.startsWith("video")?"vid":"img",
fake:false
});

saveStories();
render();
};

r.readAsDataURL(f);
}

/* SAVE */
function saveStories(){
localStorage.stories=JSON.stringify(storiesData);
}

/* RENDER */
function render(){

feed.innerHTML="";

storiesData.forEach(s=>{

const box=document.createElement("div");
box.className="card bg-white p-3 rounded shadow storyBox";

let media="";

if(s.type==="img"){
media=`<img src="${s.src}" class="storyMedia">`;
}else{
media=`<video src="${s.src}" controls class="storyMedia"></video>`;
}

box.innerHTML=`

<div class="flex gap-2 items-center mb-1">
<img src="${s.logo||'https://via.placeholder.com/30'}"
class="w-7 h-7 rounded-full">
<b>${s.u}</b>
</div>

${media}

<p class="text-sm mt-1">${s.t}</p>

`;

feed.appendChild(box);

});

}

/* INIT */
function init(){

if(localStorage.dark==="true")
body.classList.add("dark");

load();

add("Hi! I'm vazAI 🤖",0);

show("chat");
}

init();

</script>
</body>
</html>
