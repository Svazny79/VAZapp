<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAZapp</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" id="manifest">

<meta name="theme-color" content="#2563eb">

<style>

/* ===== GENERAL ===== */

body{
font-family:Arial,Helvetica,sans-serif;
transition:.3s;
}

.dark{
background:#0f172a;
color:white;
}

.dark .bg-white{
background:#1e293b!important;
color:white;
}

/* ===== SPLASH ===== */

@keyframes glow{
0%,100%{text-shadow:0 0 10px cyan,0 0 30px cyan}
50%{text-shadow:0 0 25px cyan,0 0 60px cyan}
}

#splash{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:3rem;
font-weight:bold;
animation:fadeout 1.8s ease forwards;
animation-delay:2s;
}

@keyframes fadeout{
to{opacity:0;visibility:hidden}
}

#splash span:first-child{
color:cyan;
animation:glow 1.5s infinite;
}

#splash span:last-child{
color:white;
font-weight:900;
}

/* ===== STORIES ===== */

#storiesFeed{
height:80vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.story{
scroll-snap-align:start;
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
}

.story img,.story video{
max-height:65vh;
object-fit:contain;
margin:auto;
border-radius:12px;
}

/* ===== LOGOS ===== */

.logo{
width:26px;
height:26px;
border-radius:50%;
margin-right:6px;
}

/* ===== CHAT ===== */

.chatbox{
max-height:65vh;
overflow-y:auto;
}

</style>
</head>


<body id="body" class="bg-gray-100 min-h-screen flex flex-col">


<!-- SPLASH -->

<div id="splash">
<span>VAZ</span><span>app</span>
</div>


<!-- HEADER -->

<header class="bg-blue-600 text-white p-4 flex justify-between items-center">

<h1 class="font-bold text-xl">VAZapp</h1>

<div class="space-x-2">

<button onclick="showPage('chat')" class="bg-blue-500 px-3 py-1 rounded">Chat</button>

<button onclick="showPage('stories')" class="bg-blue-500 px-3 py-1 rounded">Stories</button>

<button onclick="showPage('profile')" class="bg-blue-500 px-3 py-1 rounded">Profile</button>

<button onclick="toggleDark()" class="bg-gray-800 px-3 py-1 rounded">🌙</button>

</div>

</header>


<!-- MAIN -->

<main class="flex-1 p-4 flex justify-center">


<!-- CHAT -->

<div id="chat" class="page bg-white max-w-xl w-full p-4 rounded shadow flex flex-col">

<div class="flex items-center gap-2 mb-2">

<img id="chatAvatar" class="w-8 h-8 rounded-full" src="https://via.placeholder.com/40">

<b id="chatName">Guest</b>

</div>

<div id="chatBox" class="chatbox border p-2 rounded mb-2 flex-1"></div>

<div class="flex gap-2">

<input id="chatInput" class="flex-1 border p-2 rounded" placeholder="Type...">

<button onclick="sendChat()" class="bg-blue-600 text-white px-3 rounded">Send</button>

</div>

</div>


<!-- STORIES -->

<div id="stories" class="page hidden bg-white max-w-xl w-full p-4 rounded shadow">

<input type="file" accept="image/*,video/*" onchange="uploadStory(event)" class="mb-2">

<div id="storiesFeed"></div>

</div>


<!-- PROFILE -->

<div id="profile" class="page hidden bg-white max-w-md w-full p-4 rounded shadow">

<h2 class="font-bold text-xl mb-3">Profile</h2>

<img id="profilePic" class="w-24 h-24 mx-auto rounded-full mb-2" src="https://via.placeholder.com/120">

<input type="file" accept="image/*" onchange="loadPic(event)">

<input id="username" class="border p-2 w-full my-2" placeholder="Username">

<button onclick="saveProfile()" class="bg-blue-600 text-white w-full p-2 rounded">Save</button>

</div>

</main>


<footer class="bg-gray-200 p-2 text-center text-sm">
©2026 VAZapp
</footer>


<script>

/* ===== PWA ===== */

const manifest={
name:"VAZapp",
short_name:"VAZapp",
start_url:".",
display:"standalone",
background_color:"#000",
theme_color:"#2563eb",
icons:[
{src:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png",sizes:"192x192"},
{src:"https://cdn-icons-png.flaticon.com/512/5968/5968705.png",sizes:"512x512"}
]
};

const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
document.getElementById("manifest").href=URL.createObjectURL(blob);

if("serviceWorker"in navigator){

const sw=`
self.addEventListener('install',e=>{
e.waitUntil(caches.open('vaz').then(c=>c.addAll(['./'])))
});
self.addEventListener('fetch',e=>{
e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))
});
`;

const b=new Blob([sw],{type:"text/js"});
navigator.serviceWorker.register(URL.createObjectURL(b));

}


/* ===== NAV ===== */

function showPage(p){

document.querySelectorAll(".page").forEach(e=>e.classList.add("hidden"));

document.getElementById(p).classList.remove("hidden");

if(p==="stories")renderStories();

}


/* ===== DARK ===== */

function toggleDark(){
body.classList.toggle("dark");
localStorage.dark=body.classList.contains("dark");
}


/* ===== PROFILE ===== */

function loadPic(e){
const r=new FileReader();
r.onload=()=>profilePic.src=r.result;
r.readAsDataURL(e.target.files[0]);
}

function saveProfile(){

localStorage.user=username.value||"Guest";
localStorage.pic=profilePic.src;

loadProfile();

showPage("chat");
}

function loadProfile(){

chatName.textContent=localStorage.user||"Guest";
username.value=localStorage.user||"";

if(localStorage.pic){
chatAvatar.src=localStorage.pic;
profilePic.src=localStorage.pic;
}

}


/* ===== CHAT ===== */

function addChat(t,u){

const d=document.createElement("div");

d.className=u?"text-right text-blue-600":"text-left text-green-600";

d.textContent=(u?"You: ":"vazAI: ")+t;

chatBox.appendChild(d);

chatBox.scrollTop=999999;

}

function sendChat(){

const t=chatInput.value.trim();

if(!t)return;

addChat(t,1);

chatInput.value="";

setTimeout(()=>addChat(ai(t),0),500);

}

chatInput.onkeydown=e=>{
if(e.key==="Enter")sendChat();
};

function ai(m){

m=m.toLowerCase();

if(m.match(/\d+[+\-*\/]\d+/))return"Answer: "+eval(m);

if(m.includes("help"))return"What do you need help with?";

if(m.includes("code"))return"I can help you debug or build.";

if(m.includes("sad"))return"I'm here for you 💙";

if(m.includes("sports"))return"Who’s your favorite team?";

if(m.includes("news"))return"Want world, tech, or sports news?";

return"Tell me more.";

}


/* ===== STORIES ===== */

let stories=JSON.parse(localStorage.stories||"[]");


const fakeStories=[

{
user:"NHL",
logo:"https://upload.wikimedia.org/wikipedia/en/3/3a/NHL_Logo.svg",
type:"image",
src:"https://i.imgur.com/9p9qkQF.jpg",
text:"Connor McDavid scores twice vs Flames"
},

{
user:"NHL",
logo:"https://upload.wikimedia.org/wikipedia/en/3/3a/NHL_Logo.svg",
type:"gif",
src:"https://media.giphy.com/media/3ohs4BSacFKI7A717y/giphy.gif",
text:"Maple Leafs OT winner vs Bruins"
},

{
user:"NHL",
logo:"https://upload.wikimedia.org/wikipedia/en/3/3a/NHL_Logo.svg",
type:"gif",
src:"https://media.giphy.com/media/l0HlRm0jS9ZJtU2wE/giphy.gif",
text:"Rangers clinch playoff spot"
},

{
user:"NBC News",
logo:"https://upload.wikimedia.org/wikipedia/commons/7/79/NBC_News_2013.svg",
type:"image",
src:"https://i.imgur.com/lrKq8zN.jpg",
text:"Stocks surge after Fed announcement"
},

{
user:"NFL",
logo:"https://upload.wikimedia.org/wikipedia/en/a/a2/National_Football_League_logo.svg",
type:"image",
src:"https://i.imgur.com/Ww5Yy0Q.jpg",
text:"Chiefs win AFC Championship"
}

];


if(!localStorage.fakeLoaded){

stories=fakeStories;

localStorage.fakeLoaded=1;

saveStories();

}


function uploadStory(e){

const f=e.target.files[0];

if(!f)return;

const cap=prompt("Caption")||"My Story";

const type=f.type.startsWith("image")?"image":"video";

const r=new FileReader();

r.onload=()=>{

stories.unshift({
user:localStorage.user||"Guest",
logo:"",
type,
src:r.result,
text:cap
});

saveStories();

renderStories();

};

r.readAsDataURL(f);

}


function saveStories(){

localStorage.stories=JSON.stringify(stories);

}


function deleteStory(i){

if(!confirm("Delete?"))return;

stories.splice(i,1);

saveStories();

renderStories();

}


function renderStories(){

storiesFeed.innerHTML="";

stories.forEach((s,i)=>{

if(!s.src)return;

const d=document.createElement("div");

d.className="story border rounded p-3 mb-4";

let media="";

if(s.type==="image"||s.type==="gif"){
media=`<img src="${s.src}" loading="lazy">`;
}
else{
media=`<video src="${s.src}" controls></video>`;
}

const del=s.user===(localStorage.user||"Guest")
?`<button onclick="deleteStory(${i})" class="text-red-500">🗑️</button>`:"";

d.innerHTML=`

<div class="flex items-center justify-between mb-1">

<div class="flex items-center">

${s.logo?`<img src="${s.logo}" class="logo">`:""}

<b>${s.user}</b>

</div>

${del}

</div>

${media}

<p class="mt-1 text-sm">${s.text}</p>

`;

storiesFeed.appendChild(d);

});

}


/* ===== INIT ===== */

function init(){

if(localStorage.dark==="true")body.classList.add("dark");

if(!localStorage.user){
localStorage.user="Guest";
}

loadProfile();

addChat("Hi! I'm vazAI 🤖",0);

}

init();

</script>

</body>
</html>
