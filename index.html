<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAZapp</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* ================= BODY ================= */

body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* ================= SPLASH ================= */

#splash{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:4rem;
  font-weight:bold;
  z-index:9999;
  transition:1.2s ease;
}

#splash span:first-child{
  color:#0ff;
  text-shadow:0 0 25px cyan;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px cyan;}
  to{ text-shadow:0 0 35px cyan;}
}

/* ================= HEADER ================= */

header{
  background:#020617;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ================= MAIN ================= */

main{
  height:calc(100vh - 100px);
  overflow:hidden;
}

/* ================= STORIES ================= */

#storiesPage{
  height:100%;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
}

.story{
  height:100%;
  scroll-snap-align:start;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
}

.story img,
.story video{
  max-height:100%;
  max-width:100%;
  object-fit:contain;
}

.storyOverlay{
  position:absolute;
  bottom:0;
  width:100%;
  background:linear-gradient(transparent,black);
  padding:20px;
}

.logo{
  width:28px;
  height:28px;
  object-fit:contain;
}

/* ================= CHAT ================= */

#chat{
  height:100%;
  overflow-y:auto;
}

/* ================= HIDE ================= */

.hidden{ display:none; }

</style>
</head>

<body>

<!-- ================= SPLASH ================= -->

<div id="splash">
  <span>VAZ</span><span>app</span>
</div>

<!-- ================= HEADER ================= -->

<header>
  <h1 class="text-xl font-bold">VAZapp</h1>

  <div class="space-x-2">
    <button onclick="showChat()">Chat</button>
    <button onclick="showStories()">Stories</button>
    <button onclick="showProfile()">Profile</button>
  </div>
</header>

<!-- ================= MAIN ================= -->

<main>

<!-- ================= CHAT ================= -->

<div id="chatPage" class="h-full flex flex-col p-3">

<div id="chat" class="flex-1 bg-gray-900 rounded p-2 mb-2"></div>

<div class="flex gap-2">
<input id="msg" class="flex-1 text-black p-2 rounded">
<button onclick="send()">Send</button>
</div>

</div>

<!-- ================= STORIES ================= -->

<div id="storiesPage" class="hidden"></div>

<!-- ================= PROFILE ================= -->

<div id="profilePage" class="hidden p-4">

<h2 class="text-xl mb-2">Profile</h2>

<img id="avatar" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full mb-2">

<input type="file" onchange="loadPic(event)">

<input id="username" class="text-black w-full p-2 my-2">

<button onclick="saveProfile()">Save</button>

<hr class="my-3">

<h3>Add Story</h3>

<input type="file" accept="image/*,video/*" onchange="addStory(event)">

</div>

</main>

<!-- ================= SCRIPT ================= -->

<script>

/* ================= SPLASH ================= */

setTimeout(()=>{
  splash.style.opacity="0";
  setTimeout(()=>splash.remove(),1200);
},1600);


/* ================= NAV ================= */

const chatPage=document.getElementById("chatPage");
const storiesPage=document.getElementById("storiesPage");
const profilePage=document.getElementById("profilePage");

function showChat(){
  chatPage.classList.remove("hidden");
  storiesPage.classList.add("hidden");
  profilePage.classList.add("hidden");
}

function showStories(){
  storiesPage.classList.remove("hidden");
  chatPage.classList.add("hidden");
  profilePage.classList.add("hidden");
  renderStories();
}

function showProfile(){
  profilePage.classList.remove("hidden");
  chatPage.classList.add("hidden");
  storiesPage.classList.add("hidden");
}


/* ================= PROFILE ================= */

function loadPic(e){
  const r=new FileReader();
  r.onload=()=>avatar.src=r.result;
  r.readAsDataURL(e.target.files[0]);
}

function saveProfile(){
  localStorage.user=username.value||"Guest";
  localStorage.pic=avatar.src;
}

if(localStorage.pic) avatar.src=localStorage.pic;
if(localStorage.user) username.value=localStorage.user;


/* ================= CHAT ================= */

function add(text,me){
  const d=document.createElement("div");

  d.className=me?"text-right text-cyan-400":"text-green-400";

  d.innerText=(me?"You: ":"vazAI: ")+text;

  chat.appendChild(d);
  chat.scrollTop=999999;
}

function send(){
  const t=msg.value.trim();
  if(!t) return;

  add(t,true);
  msg.value="";

  setTimeout(()=>add(ai(t),false),600);
}

msg.onkeydown=e=>{
  if(e.key==="Enter") send();
}


/* ================= AI ================= */

function ai(m){

  m=m.toLowerCase();

  if(m.includes("code"))
    return "Tell me what you're building and I’ll help.";

  if(m.includes("math"))
    return "Send the problem and I’ll solve it.";

  if(m.includes("sad"))
    return "Talk to me. What’s going on?";

  if(m.includes("who"))
    return "Who exactly are you asking about?";

  if(m.includes("how"))
    return "Let’s break it down step by step.";

  return "Interesting. Tell me more details.";
}


/* ================= STORIES ================= */

let stories = JSON.parse(localStorage.stories||"[]");


/* ================= FAKE STORIES ================= */

const fakeStories=[

{
user:"NHL",
logo:"nhl.png",
media:"mcdavid.png",
caption:"Connor McDavid scores twice vs Flames"
},

{
user:"NHL",
logo:"nhl.png",
media:"leafs.gif",
caption:"Maple Leafs win overtime vs Bruins"
},

{
user:"NHL",
logo:"nhl.png",
media:"rangers.gif",
caption:"Rangers clinch playoff spot at MSG"
},

{
user:"NBC News",
logo:"nbc.png",
media:"news.gif",
caption:"Breaking: Market reacts to Fed announcement"
},

{
user:"NBC News",
logo:"nbc.png",
media:"stocks.jpg",
caption:"Dow jumps 400 points on tech rally"
},

{
user:"NFL",
logo:"football.gif",
media:"football.gif",
caption:"Touchdown seals dramatic comeback"
}

];

if(!localStorage.fakeLoaded){

  fakeStories.forEach(s=>{
    stories.push({
      id:Date.now()+Math.random(),
      ...s,
      type:"fake"
    });
  });

  localStorage.fakeLoaded="yes";
  saveStories();
}


/* ================= USER STORY ================= */

function addStory(e){

  const f=e.target.files[0];
  if(!f) return;

  const r=new FileReader();

  r.onload=()=>{

    stories.unshift({
      id:Date.now(),
      user:localStorage.user||"Guest",
      logo:localStorage.pic||"",
      media:r.result,
      caption:"My story",
      type:"user"
    });

    saveStories();
    renderStories();
  };

  r.readAsDataURL(f);
}


/* ================= STORAGE ================= */

function saveStories(){
  localStorage.stories=JSON.stringify(stories);
}


/* ================= RENDER ================= */

function renderStories(){

  storiesPage.innerHTML="";

  stories.forEach(s=>{

    const box=document.createElement("div");
    box.className="story";

    let media="";

    if(s.media.endsWith(".mp4")||s.media.includes("video")){
      media=`<video src="${s.media}" autoplay muted loop playsinline></video>`;
    }else{
      media=`<img src="${s.media}">`;
    }

    box.innerHTML=`

    ${media}

    <div class="storyOverlay">

      <div class="flex items-center gap-2 mb-1">

        ${s.logo?`<img src="${s.logo}" class="logo">`:""}

        <b>${s.user}</b>

      </div>

      <p>${s.caption}</p>

    </div>
    `;

    storiesPage.appendChild(box);
  });
}


/* ================= INIT ================= */

add("Hi! I'm vazAI 🤖",false);

renderStories();

</script>

</body>
</html>
